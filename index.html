<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Pro - Secure Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans">
    <div class="absolute inset-0 z-0 opacity-40 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1000&auto=format&fit=crop&q=80');"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-gray-900/80 via-gray-900/95 to-gray-900 z-0"></div>
    <div class="w-full max-w-md bg-white/10 backdrop-blur-xl rounded-3xl p-6 shadow-2xl border border-white/10 z-10 text-white relative">
        <div class="flex flex-col items-center justify-center mt-2 mb-6">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/50 transform rotate-12">
                <i class="fa-solid fa-chart-network text-2xl text-white -rotate-12"></i>
            </div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-400 tracking-widest mt-4">CAPITAL PRO</h1>
            <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider mt-1">Smart Device Network Node</p>
        </div>
        
        <div id="loginSection" class="space-y-5">
            <div class="text-center">
                <h2 class="text-lg font-extrabold text-white">Welcome Back</h2>
                <p class="text-xs text-gray-400">Sign in to manage your active nodes</p>
            </div>
            <div class="space-y-4 pt-2">
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5">Phone Number</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/20 focus-within:border-blue-500 transition-colors overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 font-bold text-sm border-r border-white/10">+91</span>
                        <input type="tel" id="loginPhone" placeholder="Enter mobile number" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-500">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/20 focus-within:border-blue-500 transition-colors overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 text-sm border-r border-white/10"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="loginPassword" placeholder="Enter secure password" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-500">
                    </div>
                </div>
                <button onclick="executeLogin()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-black py-3.5 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98] mt-2 text-sm uppercase tracking-wider">
                    Secure Login
                </button>
                <div class="text-center pt-2">
                    <p class="text-xs text-gray-400">Don't have a node account? 
                        <button onclick="toggleAuthScreens('register')" class="text-blue-400 font-extrabold hover:underline bg-transparent border-none p-0 ml-1 cursor-pointer">Register Here</button>
                    </p>
                </div>
            </div>
        </div>

        <div id="registerSection" class="space-y-5 hidden">
            <div class="text-center">
                <h2 class="text-lg font-extrabold text-white">Create Node Account</h2>
                <p class="text-xs text-gray-400">Register to start claiming daily returns</p>
            </div>
            <div class="space-y-4 pt-2">
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5">Mobile Number</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/20 focus-within:border-emerald-500 transition-colors overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 font-bold text-sm border-r border-white/10">+91</span>
                        <input type="tel" id="regPhone" placeholder="Enter 10-digit number" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-500">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5">Choose Password</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/20 focus-within:border-emerald-500 transition-colors overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 text-sm border-r border-white/10"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="regPassword" placeholder="Minimum 6 characters" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-500">
                    </div>
                </div>
                <button onclick="executeRegister()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black py-3.5 rounded-xl shadow-lg shadow-emerald-500/20 transition-all active:scale-[0.98] mt-2 text-sm uppercase tracking-wider">
                    Create Account
                </button>
                <div class="text-center pt-2">
                    <p class="text-xs text-gray-400">Already have an account? 
                        <button onclick="toggleAuthScreens('login')" class="text-emerald-400 font-extrabold hover:underline bg-transparent border-none p-0 ml-1 cursor-pointer">Login Now</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exact matched firebase configuration configuration with active Database URL
        const firebaseConfig = {
            apiKey: "AIzaSyCAUQfcd1k63pp2DDyBHWZoD5M-dkiD45s",
            authDomain: "scarlet-private-limited.firebaseapp.com",
            databaseURL: "https://scarlet-private-limited-default-rtdb.firebaseio.com/", // Critical Link Locked
            projectId: "scarlet-private-limited",
            storageBucket: "scarlet-private-limited.firebasestorage.com",
            messagingSenderId: "570744434725",
            appId: "1:570744434725:web:14b0452a7810806a1ccfcc",
            measurementId: "G-4FZBRZRQBY"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleAuthScreens(targetScreen) {
            if(targetScreen === 'login') {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('registerSection').classList.add('hidden');
            } else {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('registerSection').classList.remove('hidden');
            }
        }

        function executeRegister() {
            const phoneInput = document.getElementById('regPhone').value.trim();
            const passwordInput = document.getElementById('regPassword').value.trim();
            if(phoneInput.length < 10 || passwordInput.length < 6) {
                alert("Validation Fail: Phone layout requires 10-digits & password must be 6+ chars.");
                return;
            }
            database.ref('users/' + phoneInput).once('value', snapshot => {
                if(snapshot.exists()) {
                    alert("System Reject: This phone number is already registered inside node arrays.");
                } else {
                    database.ref('users/' + phoneInput).set({
                        password: passwordInput,
                        walletBalance: 0.00,
                        nodeEarnings: 0.00
                    }).then(() => {
                        alert("Account Database Node Created on Cloud! Please login now.");
                        toggleAuthScreens('login');
                    }).catch(err => {
                        alert("Write Fail: " + err.message);
                    });
                }
            });
        }

        function executeLogin() {
            const phoneInput = document.getElementById('loginPhone').value.trim();
            const passwordInput = document.getElementById('loginPassword').value.trim();
            if(!phoneInput || !passwordInput) {
                alert("Input Missing: Complete validation credentials layout.");
                return;
            }
            database.ref('users/' + phoneInput).once('value', snapshot => {
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.password === passwordInput) {
                        alert("Authentication Success! Connecting to cloud clusters...");
                        
                        // Exact match storage routing token
                        localStorage.setItem('storedPhone', phoneInput); 
                        window.location.href = 'home.html';
                    } else {
                        alert("Security Reject: Incorrect password entry string.");
                    }
                } else {
                    alert("Data Null: No registration array found matching this number.");
                }
            });
        }
    </script>
</body>
  </html>
