<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Pro - Gateway Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 min-h-screen text-white font-sans flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute inset-0 bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 z-0"></div>

    <div class="w-full max-w-md bg-white/[0.02] backdrop-blur-3xl rounded-3xl border border-white/10 shadow-2xl p-6 sm:p-8 z-10 relative">
        
        <div class="flex flex-col items-center justify-center text-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-blue-500/20 mb-3">
                <i class="fa-solid fa-chart-line text-white"></i>
            </div>
            <h1 class="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">CAPITAL PRO</h1>
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mt-1">Institutional Asset Management</p>
        </div>

        <div id="loginBlock" class="space-y-5">
            <div class="text-center">
                <h2 class="text-md font-extrabold text-white uppercase tracking-wider">Secure Gateway Sign-In</h2>
                <p class="text-[11px] text-gray-400 mt-1">Enter your authorization credentials</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Registered Phone</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 focus-within:border-blue-500 transition-all overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 font-bold text-sm border-r border-white/10">+91</span>
                        <input type="tel" id="loginPhone" placeholder="7323863845" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-600">
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Access Password</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 focus-within:border-blue-500 transition-all overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 text-sm border-r border-white/10"><i class="fa-solid fa-shield-halved"></i></span>
                        <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-600">
                    </div>
                </div>
                
                <button type="button" onclick="handleLoginRequest()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-wider shadow-lg shadow-blue-500/20 active:scale-[0.99] transition-all">
                    Authorize Connection
                </button>

                <p class="text-xs text-gray-400 text-center pt-2">
                    New asset provider? 
                    <button type="button" onclick="switchInterface('register')" class="text-blue-400 font-extrabold hover:underline bg-transparent border-none cursor-pointer">Establish Account</button>
                </p>
            </div>
        </div>

        <div id="registerBlock" class="space-y-5 hidden">
            <div class="text-center">
                <h2 class="text-md font-extrabold text-white uppercase tracking-wider">Initialize Mainframe Array</h2>
                <p class="text-[11px] text-gray-400 mt-1">Register verified line to pool nodes</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Target Handset Number</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 focus-within:border-emerald-500 transition-all overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 font-bold text-sm border-r border-white/10">+91</span>
                        <input type="tel" id="regPhone" placeholder="Enter 10-digit number" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-600">
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Secure Password String</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 focus-within:border-emerald-500 transition-all overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 text-sm border-r border-white/10"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="regPassword" placeholder="Minimum 6 characters" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white placeholder-gray-600">
                    </div>
                </div>
                
                <button type="button" onclick="handleRegisterRequest()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-wider shadow-lg shadow-emerald-500/20 active:scale-[0.99] transition-all">
                    Synchronize Mainframe Cluster
                </button>

                <p class="text-xs text-gray-400 text-center pt-2">
                    Already have node sync? 
                    <button type="button" onclick="switchInterface('login')" class="text-emerald-400 font-extrabold hover:underline bg-transparent border-none cursor-pointer">Return to Gateway</button>
                </p>
            </div>
        </div>

    </div>

    <script>
        // Exact matching config from your Firebase console screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyCAUQfcd1k63pp2DDyBHWZoD5M-dkiD45s",
            authDomain: "scarlet-private-limited.firebaseapp.com",
            databaseURL: "https://scarlet-private-limited-default-rtdb.firebaseio.com/", 
            projectId: "scarlet-private-limited",
            storageBucket: "scarlet-private-limited.firebasestorage.app",
            messagingSenderId: "570744434725",
            appId: "1:570744434725:web:14b0452a7810806a1ccfcc",
            measurementId: "G-4FZBRZRQBY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function switchInterface(target) {
            if(target === 'login') {
                document.getElementById('loginBlock').classList.remove('hidden');
                document.getElementById('registerBlock').classList.add('hidden');
            } else {
                document.getElementById('loginBlock').classList.add('hidden');
                document.getElementById('registerBlock').classList.remove('hidden');
            }
        }

        function handleRegisterRequest() {
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            
            if(phone.length !== 10 || password.length < 6) {
                alert("Error: Enter valid 10-digit number & minimum 6-character password.");
                return;
            }

            database.ref('users/' + phone).once('value').then(snapshot => {
                if(snapshot.exists()) {
                    alert("Account already exists on this number!");
                } else {
                    database.ref('users/' + phone).set({
                        password: password,
                        walletBalance: 0.00,
                        nodeEarnings: 0.00,
                        lockedFunds: 0.00
                    }).then(() => {
                        alert("Registration Successful! Please login now.");
                        switchInterface('login');
                    });
                }
            });
        }

        function handleLoginRequest() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if(!phone || !password) {
                alert("Please fill all fields.");
                return;
            }

            database.ref('users/' + phone).once('value').then(snapshot => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    if(data.password === password) {
                        alert("Authentication Success!");
                        
                        // Dual Storage Strategy: Memory pipeline block lock kiya
                        localStorage.setItem('sessionUserPhone', phone);
                        
                        // Redirecting to dashboard
                        window.location.href = "home.html?user=" + phone;
                    } else {
                        alert("Incorrect Password!");
                    }
                } else {
                    alert("No account found. Please register first.");
                }
            }).catch(err => {
                alert("Database Link Error: " + err.message);
            });
        }
    </script>
</body>
  </html>
