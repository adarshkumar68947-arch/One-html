<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Capital Pro</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--page-bg:rgb(255,255,255);--input-bg:rgb(255,255,255);--text-main:rgb(26,26,26);--band-color:rgb(230,237,249);--label:rgb(154,163,178);--placeholder:rgb(184,192,207);--primary:rgb(21,101,255);--primary-dark:rgb(10,79,217);--primary-light:rgb(59,130,255)}html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--page-bg);color:var(--text-main);position:relative;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient( 135deg,transparent 0,transparent calc(5px + 55px),var(--band-color) calc(1px + 59px),var(--band-color) calc(2px + 108px) );mask-image:linear-gradient(to bottom,rgb(0,0,0) 0%,transparent 25%,transparent 75%,rgb(0,0,0) 100%);-webkit-mask-image:linear-gradient(to bottom,rgb(0,0,0) 0%,transparent 25%,transparent 75%,rgb(0,0,0) 100%);pointer-events:none;z-index:0}.bg-circles{position:fixed;inset:0;pointer-events:none;z-index:0}.bg-circles::before{content:'';position:absolute;top:-60px;left:-60px;width:calc(3px + 217px);height:calc(2px + 218px);background:radial-gradient(circle,rgba(220,232,250,0.55),transparent 70%);border-radius:50%}.bg-circles::after{content:'';position:absolute;bottom:-80px;right:-80px;width:calc(4px + 236px);height:calc(1px + 239px);background:radial-gradient(circle,rgba(220,232,250,0.55),transparent 70%);border-radius:50%}.page{width:100%;max-width:calc(2px + 398px);margin:0 auto;min-height:100vh;padding:calc(1px + 21px) calc(4px + 18px) calc(1px + 31px);position:relative;z-index:1}.logo-wrap{display:flex;justify-content:center;align-items:center;margin-top:calc(1px + 13px);margin-bottom:calc(3px + 23px)}.logo-wrap img{max-width:calc(5px + 145px);max-height:calc(5px + 95px);object-fit:contain}.welcome-title{font-size:calc(3px + 15px);font-weight:700;color:rgb(17,17,17);margin-bottom:calc(2px + 14px);text-align:left}.field-group{margin-bottom:calc(3px + 10px);position:relative}.field-label{display:block;font-size:11.5px;color:var(--label);margin-bottom:calc(1px + 4px);font-weight:400}.field-box{display:flex;align-items:center;background:var(--input-bg);border:none;border-radius:calc(1px + 4px);padding:0 calc(2px + 9px);height:calc(2px + 42px);gap:calc(2px + 6px);box-shadow:0 calc(1px + 3px) calc(2px + 8px) rgba(0,0,0,0.06),0 calc(2px + 6px) calc(5px + 15px) rgba(0,0,0,0.05),inset 0 0 0 1px rgba(230,235,245,0.8);transition:box-shadow 0.2s}.field-box:focus-within{box-shadow:0 calc(1px + 3px) calc(3px + 9px) rgba(70,130,255,0.12),0 calc(1px + 7px) calc(4px + 18px) rgba(70,130,255,0.08),inset 0 0 0 1px rgba(70,130,255,0.32)}.phone-prefix{color:rgb(26,26,26);font-size:calc(4px + 10px);font-weight:500;margin-right:calc(3px + 7px);padding-right:calc(1px + 9px);border-right:1px solid rgb(224,231,240)}.field-input{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:calc(2px + 12px);color:var(--text-main);height:100%}.field-input::placeholder{color:var(--placeholder)}.eye-btn{background:none;border:none;cursor:pointer;color:var(--primary);padding:0;display:flex;align-items:center;justify-content:center}.eye-btn svg{width:calc(2px + 18px);height:calc(5px + 15px)}.options-row{display:flex;justify-content:space-between;align-items:center;margin-top:calc(3px + 9px);margin-bottom:calc(1px + 5px)}.remember-wrap{display:flex;align-items:center;gap:calc(2px + 5px);cursor:pointer;user-select:none}.remember-checkbox{width:calc(3px + 15px);height:calc(3px + 15px);border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}.remember-checkbox svg{width:calc(2px + 8px);height:calc(3px + 7px);color:rgb(255,255,255)}.remember-checkbox.unchecked{background:rgb(255,255,255);border:1.5px solid rgb(205,213,224)}.remember-checkbox.unchecked svg{display:none}#remember-hidden{display:none}.remember-label{font-size:calc(2px + 11px);color:rgb(74,74,74);font-weight:400}.forgot-link{font-size:calc(2px + 11px);color:var(--primary);text-decoration:none;font-weight:400}.signin-btn{width:100%;height:calc(4px + 44px);margin-top:calc(4px + 14px);border:none;border-radius:calc(1px + 6px);background:linear-gradient(180deg,var(--primary-light) 0%,var(--primary-dark) 100%);color:rgb(255,255,255);font-family:inherit;font-size:calc(2px + 14px);font-weight:600;cursor:pointer;letter-spacing:calc(0.01em + 0.01em);box-shadow:0 calc(1px + 3px) calc(2px + 10px) rgba(21,101,255,0.24)}.signin-btn:active{transform:translateY(1px)}.signin-btn:disabled{opacity:0.7;cursor:not-allowed}.register-btn{width:100%;height:calc(1px + 45px);margin-top:calc(1px + 9px);border:1.5px solid var(--primary);border-radius:calc(2px + 5px);background:rgb(255,255,255);color:var(--primary);font-family:inherit;font-size:calc(4px + 11px);font-weight:500;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}#_alrt_wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:9999}#_alrt_box{display:flex;align-items:center;gap:calc(2px + 6px);background:rgba(0,0,0,0.85);color:rgb(255,255,255);padding:calc(3px + 7px) calc(5px + 15px);border-radius:calc(3px + 21px);font-size:calc(2px + 11px);font-weight:500;pointer-events:auto;opacity:0;transform:translateY(calc(2px + 18px));transition:opacity 0.3s ease,transform 0.3s ease;max-width:calc(4px + 316px);text-align:center;box-shadow:0 calc(1px + 3px) calc(1px + 19px) rgba(0,0,0,0.3)}#_alrt_box.show{opacity:1;transform:translateY(0)}
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  </head>
  <body>
    <div class="bg-circles"></div>
    <div class="page">
      <div class="logo-wrap">
        <img src="https://i.ibb.co/d0d9m3W6/IMG-20260504-WA0067-removebg-preview.png" alt="Logo" />
      </div>
      <div class="welcome-title">Welcome back !</div>
      
      <form id="loginForm" style="width:100%;">
        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <div class="field-box">
            <span class="phone-prefix">+91</span>
            <input type="text" name="phone" id="phone" class="field-input" placeholder="Enter phone number" maxlength="10" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Password</label>
          <div class="field-box">
            <input type="password" name="password" id="password" class="field-input" placeholder="Enter password" />
            <button type="button" class="eye-btn" id="eye-btn-password" onclick="togglePassword('password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12c2-3 5-5 9-5s7 2 9 5"></path>
                <line x1="7" y1="15" x2="6" y2="17"></line>
                <line x1="12" y1="16" x2="12" y2="18.5"></line>
                <line x1="17" y1="15" x2="18" y2="17"></line>
                <line x1="9.5" y1="15.7" x2="9" y2="18"></line>
                <line x1="14.5" y1="15.7" x2="15" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="options-row">
          <label class="remember-wrap" onclick="toggleRemember()">
            <span class="remember-checkbox" id="rememberBox">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            <span class="remember-label">Remember Password</span>
            <input type="checkbox" id="remember-hidden" name="remember" checked />
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <button type="button" id="loginBtn" class="signin-btn">Sign In</button>
        <a href="register.html" class="register-btn">No account? Register</a>
      </form>
    </div>

    <div id="_alrt_wrap">
      <div id="_alrt_box">
        <span id="_alrt_txt"></span>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      // ── STEP 2: APNA GOOGLE FIREBASE CONFIGURATION YAHA DAALEIN ──
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
      
      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      // Password Toggle Logic
      const eyeOpenSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12s3-7 9-7 9 7 9 7-3 7-9 7-9-7-9-7z"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>`;
      const eyeClosedSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c2-3 5-5 9-5s7 2 9 5"/><line x1="7" y1="15" x2="6" y2="17"/><line x1="12" y1="16" x2="12" y2="18.5"/><line x1="17" y1="15" x2="18" y2="17"/><line x1="9.5" y1="15.7" x2="9" y2="18"/><line x1="14.5" y1="15.7" x2="15" y2="18"/></svg>`;
      
      function togglePassword(id) {
        const input = document.getElementById(id);
        const btn = document.getElementById('eye-btn-' + id);
        if (input.type === 'password') {
          input.type = 'text';
          btn.innerHTML = eyeOpenSVG;
        } else {
          input.type = 'password';
          btn.innerHTML = eyeClosedSVG;
        }
      }

      function toggleRemember() {
        const box = document.getElementById('rememberBox');
        const hidden = document.getElementById('remember-hidden');
        if (box.classList.contains('unchecked')) {
          box.classList.remove('unchecked');
          hidden.checked = true;
        } else {
          box.classList.add('unchecked');
          hidden.checked = false;
        }
      }

      // Alert Notification Box
      let _t;
      window._showAlert = function (msg, type) {
        clearTimeout(_t);
        const box = document.getElementById('_alrt_box');
        const wrap = document.getElementById('_alrt_wrap');
        document.getElementById('_alrt_txt').textContent = msg;
        wrap.style.pointerEvents = 'auto';
        box.classList.remove('show');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          box.classList.add('show');
        }));
        _t = setTimeout(() => {
          box.classList.remove('show');
          setTimeout(() => { wrap.style.pointerEvents = 'none'; }, 300);
        }, 2500);
      };

      // ── STEP 3: ASLI GOOGLE CONSOLE/FIREBASE LOGIN SYSTEM ──
      $('#loginBtn').on('click', function () {
        let btn = $(this);
        let phone = $('#phone').val().trim();
        let password = $('#password').val();

        if (!phone) { _showAlert('Please enter mobile number', 'error'); return; }
        if (!password) { _showAlert('Please enter password', 'error'); return; }

        btn.prop('disabled', true).text('Signing in...');

        // Firebase database se user verify karna
        database.ref('users/' + phone).once('value').then((snapshot) => {
          btn.prop('disabled', false).text('Sign In');
          if (snapshot.exists()) {
            let userData = snapshot.val();
            if (userData.password === password) {
              _showAlert('Login Successful!', 'success');
              // Sahi hone par seedhe aapke purane home.html par redirect karega
              setTimeout(() => { window.location.href = "home.html"; }, 1200);
            } else {
              _showAlert('Wrong Password!', 'error');
            }
          } else {
            _showAlert('User not registered!', 'error');
          }
        }).catch((error) => {
          btn.prop('disabled', false).text('Sign In');
          _showAlert('Server error, try again', 'error');
        });
      });

      $(document).on('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); $('#loginBtn').click(); }
      });
    </script>
  </body>
  </html>
