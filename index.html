<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Pro - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 min-h-screen text-white font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/5 backdrop-blur-2xl rounded-3xl p-6 border border-white/10 shadow-2xl">
        
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-chart-line text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 tracking-widest mt-4">CAPITAL PRO</h1>
        </div>

        <div id="loginSection" class="space-y-5">
            <div class="text-center">
                <h2 class="text-lg font-extrabold text-white">Secure Gateway</h2>
                <p class="text-xs text-gray-400">Enter credentials to login</p>
            </div>
            <div class="space-y-4 pt-2">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Registered Phone</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 font-bold text-sm border-r border-white/10">+91</span>
                        <input type="tel" id="loginPhone" placeholder="Enter mobile number" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Access Password</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 text-sm border-r border-white/10"><i class="fa-solid fa-shield-halved"></i></span>
                        <input type="password" id="loginPassword" placeholder="Enter password string" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white">
                    </div>
                </div>
                <button type="button" onclick="executeLogin()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-3.5 rounded-xl shadow-lg uppercase tracking-wider text-sm">
                    Authorize Connection
                </button>
                <div class="text-center pt-2">
                    <p class="text-xs text-gray-400">New asset provider? 
                        <button type="button" onclick="dikhaoRegister()" class="text-blue-400 font-extrabold hover:underline bg-transparent border-none p-0 ml-1 cursor-pointer">Establish Account</button>
                    </p>
                </div>
            </div>
        </div>

        <div id="registerSection" class="space-y-5 hidden">
            <div class="text-center">
                <h2 class="text-lg font-extrabold text-white">Deploy New Node Portfolio</h2>
                <p class="text-xs text-gray-400">Register verified line to start</p>
            </div>
            <div class="space-y-4 pt-2">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Mobile Number</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 font-bold text-sm border-r border-white/10">+91</span>
                        <input type="tel" id="regPhone" placeholder="Enter 10-digit number" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Create Password</label>
                    <div class="flex rounded-xl border border-white/10 bg-black/40 overflow-hidden">
                        <span class="bg-white/5 px-3 py-3 text-gray-400 text-sm border-r border-white/10"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="regPassword" placeholder="Minimum 6 characters" class="w-full px-3 py-3 text-sm outline-none bg-transparent text-white">
                    </div>
                </div>
                <button type="button" onclick="executeRegister()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-3.5 rounded-xl shadow-lg uppercase tracking-wider text-sm">
                    Initialize Mainframe Node
                </button>
                <div class="text-center pt-2">
                    <p class="text-xs text-gray-400">Already synchronized? 
                        <button type="button" onclick="dikhaoLogin()" class="text-emerald-400 font-extrabold hover:underline bg-transparent border-none p-0 ml-1 cursor-pointer">Return to Login</button>
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Firebase Configuration (Same to same purana wala)
        const firebaseConfig = {
            apiKey: "AIzaSyCAUQfcd1k63pp2DDyBHWZoD5M-dkiD45s",
            authDomain: "scarlet-private-limited.firebaseapp.com",
            databaseURL: "https://scarlet-private-limited-default-rtdb.firebaseio.com/", 
            projectId: "scarlet-private-limited",
            storageBucket: "scarlet-private-limited.firebasestorage.com",
            messagingSenderId: "570744434725",
            appId: "1:570744434725:web:14b0452a7810806a1ccfcc",
            measurementId: "G-4FZBRZRQBY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. SIMPLE TOGGLE FUNCTIONS (Sirf screen badalne ke liye)
        function dikhaoRegister() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('hidden');
        }

        function dikhaoLogin() {
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        // 2. CORE REGISTER LOGIC (Purani register file jaisa)
        function executeRegister() {
            const phoneInput = document.getElementById('regPhone').value.trim();
            const passwordInput = document.getElementById('regPassword').value.trim();
            
            if(phoneInput.length < 10 || passwordInput.length < 6) {
                alert("Validation Fail: Input requires 10-digits & password must be 6+ chars.");
                return;
            }

            database.ref('users/' + phoneInput).once('value', snapshot => {
                if(snapshot.exists()) {
                    alert("System Reject: This phone number is already registered.");
                } else {
                    database.ref('users/' + phoneInput).set({
                        password: passwordInput,
                        walletBalance: 0.00,
                        nodeEarnings: 0.00,
                        lockedFunds: 0.00
                    }).then(() => {
                        alert("Asset Account Generated! Access login dashboard now.");
                        dikhaoLogin(); // Account bante hi login par bhej dega
                    });
                }
            });
        }

        // 3. CORE LOGIN LOGIC (Purani login file jaisa)
        function executeLogin() {
            const phoneInput = document.getElementById('loginPhone').value.trim();
            const passwordInput = document.getElementById('loginPassword').value.trim();
            
            if(!phoneInput || !passwordInput) {
                alert("Input Missing: Fill details completely.");
                return;
            }

            database.ref('users/' + phoneInput).once('value', snapshot => {
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.password === passwordInput) {
                        alert("Success: Login Authorized!");
                        // Yahan tum apna dashboard wala page redirect kar sakte ho jaise pehle karte the
                    } else {
                        alert("Security Reject: Wrong password.");
                    }
                } else {
                    alert("Data Null: No account found with this number.");
                }
            });
        }
    </script>
</body>
  </html>
