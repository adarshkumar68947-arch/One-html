<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capital Pro - Portal</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--page-bg:rgb(255,255,255);--input-bg:rgb(255,255,255);--text-main:rgb(26,26,26);--band-color:rgb(230,237,249);--label:rgb(154,163,178);--placeholder:rgb(184,192,207);--primary:rgb(21,101,255);--primary-dark:rgb(10,79,217);--primary-light:rgb(59,130,255)}html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--page-bg);color:var(--text-main);position:relative;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient( 135deg,transparent 0,transparent calc(5px + 55px),var(--band-color) calc(1px + 59px),var(--band-color) calc(2px + 108px) );mask-image:linear-gradient(to bottom,rgb(0,0,0) 0%,transparent 25%,transparent 75%,rgb(0,0,0) 100%);-webkit-mask-image:linear-gradient(to bottom,rgb(0,0,0) 0%,transparent 25%,transparent 75%,rgb(0,0,0) 100%);pointer-events:none;z-index:0}.bg-circles{position:fixed;inset:0;pointer-events:none;z-index:0}.bg-circles::before{content:'';position:absolute;top:-60px;left:-60px;width:calc(3px + 217px);height:calc(2px + 218px);background:radial-gradient(circle,rgba(220,232,250,0.55),transparent 70%);border-radius:50%}.bg-circles::after{content:'';position:absolute;bottom:-80px;right:-80px;width:calc(4px + 236px);height:calc(1px + 239px);background:radial-gradient(circle,rgba(220,232,250,0.55),transparent 70%);border-radius:50%}.page{width:100%;max-width:calc(2px + 398px);margin:0 auto;min-height:100vh;padding:calc(1px + 21px) calc(4px + 18px) calc(1px + 31px);position:relative;z-index:1}.logo-wrap{display:flex;justify-content:center;align-items:center;margin-top:calc(1px + 13px);margin-bottom:calc(3px + 23px)}.logo-wrap img{max-width:calc(5px + 145px);max-height:calc(5px + 95px);object-fit:contain}.welcome-title{font-size:calc(3px + 15px);font-weight:700;color:rgb(17,17,17);margin-bottom:calc(2px + 14px);text-align:left}.field-group{margin-bottom:calc(3px + 10px);position:relative}.field-label{display:block;font-size:11.5px;color:var(--label);margin-bottom:calc(1px + 4px);font-weight:400}.field-box{display:flex;align-items:center;background:var(--input-bg);border:none;border-radius:calc(1px + 4px);padding:0 calc(2px + 9px);height:calc(2px + 42px);gap:calc(2px + 6px);box-shadow:0 calc(1px + 3px) calc(2px + 8px) rgba(0,0,0,0.06),0 calc(2px + 6px) calc(5px + 15px) rgba(0,0,0,0.05),inset 0 0 0 1px rgba(230,235,245,0.8);transition:box-shadow 0.2s}.field-box:focus-within{box-shadow:0 calc(1px + 3px) calc(3px + 9px) rgba(70,130,255,0.12),0 calc(1px + 7px) calc(4px + 18px) rgba(70,130,255,0.08),inset 0 0 0 1px rgba(70,130,255,0.32)}.phone-prefix{color:rgb(26,26,26);font-size:calc(4px + 10px);font-weight:500;margin-right:calc(3px + 7px);padding-right:calc(1px + 9px);border-right:1px solid rgb(224,231,240)}.field-input{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:calc(2px + 12px);color:var(--text-main);height:100%}.field-input::placeholder{color:var(--placeholder)}.eye-btn{background:none;border:none;cursor:pointer;color:var(--primary);padding:0;display:flex;align-items:center;justify-content:center;font-size: 16px; width: 24px; height: 24px;}.options-row{display:flex;justify-content:space-between;align-items:center;margin-top:calc(3px + 9px);margin-bottom:calc(1px + 5px)}.remember-wrap{display:flex;align-items:center;gap:calc(2px + 5px);cursor:pointer;user-select:none}.remember-checkbox{width:calc(3px + 15px);height:calc(3px + 15px);border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}.remember-checkbox svg{width:calc(2px + 8px);height:calc(3px + 7px);color:rgb(255,255,255)}.remember-checkbox.unchecked{background:rgb(255,255,255);border:1.5px solid rgb(205,213,224)}.remember-checkbox.unchecked svg{display:none}.remember-label{font-size:calc(2px + 11px);color:rgb(74,74,74);font-weight:400}.forgot-link{font-size:calc(2px + 11px);color:var(--primary);text-decoration:none;font-weight:400}.signin-btn{width:100%;height:calc(4px + 44px);margin-top:calc(4px + 14px);border:none;border-radius:calc(1px + 6px);background:linear-gradient(180deg,var(--primary-light) 0%,var(--primary-dark) 100%);color:rgb(255,255,255);font-family:inherit;font-size:calc(2px + 14px);font-weight:600;cursor:pointer;letter-spacing:calc(0.01em + 0.01em);box-shadow:0 calc(1px + 3px) calc(2px + 10px) rgba(21,101,255,0.24)}.signin-btn:active{transform:translateY(1px)}.signin-btn:disabled{opacity:0.7;cursor:not-allowed}.register-btn{width:100%;height:calc(1px + 45px);margin-top:calc(1px + 9px);border:1.5px solid var(--primary);border-radius:calc(2px + 5px);background:rgb(255,255,255);color:var(--primary);font-family:inherit;font-size:calc(4px + 11px);font-weight:500;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}#_alrt_wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:9999}#_alrt_box{display:flex;align-items:center;gap:calc(2px + 6px);background:rgba(0,0,0,0.85);color:rgb(255,255,255);padding:calc(3px + 7px) calc(5px + 15px);border-radius:calc(3px + 21px);font-size:calc(2px + 11px);font-weight:500;pointer-events:auto;opacity:0;transform:translateY(calc(2px + 18px));transition:opacity 0.3s ease,transform 0.3s ease;max-width:calc(4px + 316px);text-align:center;box-shadow:0 calc(1px + 3px) calc(1px + 19px) rgba(0,0,0,0.3)}#_alrt_box.show{opacity:1;transform:translateY(0)}.form-section{display:none}.form-section.active{display:block}
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  </head>
  <body>
    <div class="bg-circles"></div>
    <div class="page">
      <div class="logo-wrap">
        <img src="https://i.ibb.co/d0d9m3W6/IMG-20260504-WA0067-removebg-preview.png" alt="Logo" />
      </div>

      <div id="loginSection" class="form-section active">
        <div class="welcome-title">Welcome back !</div>
        <form id="loginForm" style="width:100%;">
          <div class="field-group">
            <label class="field-label">Phone Number</label>
            <div class="field-box">
              <span class="phone-prefix">+91</span>
              <input type="text" id="loginPhone" class="field-input" placeholder="Enter phone number" maxlength="10" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Password</label>
            <div class="field-box">
              <input type="password" id="loginPassword" class="field-input" placeholder="Enter password" />
              <button type="button" class="eye-btn" onclick="togglePassword('loginPassword')">👁️</button>
            </div>
          </div>
          <div class="options-row">
            <label class="remember-wrap" onclick="toggleRemember()">
              <span class="remember-checkbox" id="rememberBox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </span>
              <span class="remember-label">Remember Password</span>
            </label>
            <a href="#" class="forgot-link" onclick="switchForm('forgotSection')">Forgot Password?</a>
          </div>
          <button type="button" id="loginBtn" class="signin-btn">Sign In</button>
          <button type="button" class="register-btn" onclick="switchForm('registerSection')">No account? Register</button>
        </form>
      </div>

      <div id="registerSection" class="form-section">
        <div class="welcome-title">Create Account</div>
        <form id="registerForm" style="width:100%;">
          <div class="field-group">
            <label class="field-label">Phone Number</label>
            <div class="field-box">
              <span class="phone-prefix">+91</span>
              <input type="text" id="regPhone" class="field-input" placeholder="Enter phone number" maxlength="10" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Create Password</label>
            <div class="field-box">
              <input type="password" id="regPassword" class="field-input" placeholder="Create password" />
              <button type="button" class="eye-btn" onclick="togglePassword('regPassword')">👁️</button>
            </div>
          </div>
          <button type="button" id="regBtn" class="signin-btn">Register Now</button>
          <button type="button" class="register-btn" onclick="switchForm('loginSection')">Already have an account? Sign In</button>
        </form>
      </div>

      <div id="forgotSection" class="form-section">
        <div class="welcome-title">Reset Password</div>
        <form id="forgotForm" style="width:100%;">
          <div class="field-group">
            <label class="field-label">Registered Phone Number</label>
            <div class="field-box">
              <span class="phone-prefix">+91</span>
              <input type="text" id="forgotPhone" class="field-input" placeholder="Enter phone number" maxlength="10" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">New Password</label>
            <div class="field-box">
              <input type="password" id="forgotNewPassword" class="field-input" placeholder="Enter new password" />
              <button type="button" class="eye-btn" onclick="togglePassword('forgotNewPassword')">👁️</button>
            </div>
          </div>
          <button type="button" id="forgotBtn" class="signin-btn">Update Password</button>
          <button type="button" class="register-btn" onclick="switchForm('loginSection')">Back to Sign In</button>
        </form>
      </div>

    </div>

    <div id="_alrt_wrap"><div id="_alrt_box"><span id="_alrt_txt"></span></div></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      // ── FIREBASE CONFIGURATION (Using your actual project details) ──
      const firebaseConfig = {
        apiKey: "AIzaSyCAUQfcd1k63pp2DDyBHWZoD5M-dkid45M",
        authDomain: "scarlet-private-limited.firebaseapp.com",
        databaseURL: "https://scarlet-private-limited-default-rtdb.firebaseio.com/",
        projectId: "scarlet-private-limited",
        storageBucket: "scarlet-private-limited.firebasestorage.app",
        messagingSenderId: "570744434725",
        appId: "1:570744434725:web:14b0452a7810806a1ccfcc"
      };
      
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      // Form Switcher Engine
      function switchForm(sectionId) {
        $('.form-section').removeClass('active');
        $('#' + sectionId).addClass('active');
      }

      // Password Toggle System
      function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
      }

      function toggleRemember() {
        $('#rememberBox').toggleClass('unchecked');
      }

      // Custom Clean Toast Alerts
      let _t;
      window._showAlert = function (msg) {
        clearTimeout(_t);
        document.getElementById('_alrt_txt').textContent = msg;
        document.getElementById('_alrt_wrap').style.pointerEvents = 'auto';
        $('#_alrt_box').addClass('show');
        _t = setTimeout(() => {
          $('#_alrt_box').removeClass('show');
          setTimeout(() => { document.getElementById('_alrt_wrap').style.pointerEvents = 'none'; }, 300);
        }, 2500);
      };

      // ── 1. SIGN IN CORE LOGIC ──
      $('#loginBtn').on('click', function () {
        let phone = $('#loginPhone').val().trim();
        let password = $('#loginPassword').val();
        if (!phone || !password) { _showAlert('Please fill all fields'); return; }

        let btn = $(this);
        btn.prop('disabled', true).text('Signing in...');
        
        database.ref('users/' + phone).once('value').then((snapshot) => {
          btn.prop('disabled', false).text('Sign In');
          if (snapshot.exists()) {
            let userData = snapshot.val();
            if (userData.password === password) {
              _showAlert('Success! Redirecting...');
              // User ka number local session me save kar rahe hain taaki home page use read kar sake
              localStorage.setItem('loggedInUser', phone);
              setTimeout(() => { window.location.href = "home.html"; }, 1200);
            } else {
              _showAlert('Invalid password!');
            }
          } else {
            _showAlert('User not found!');
          }
        }).catch(() => {
          btn.prop('disabled', false).text('Sign In');
          _showAlert('Database Connection Error!');
        });
      });

      // ── 2. REGISTER CORE LOGIC ──
      $('#regBtn').on('click', function () {
        let phone = $('#regPhone').val().trim();
        let password = $('#regPassword').val();
        if (phone.length !== 10 || !password) { _showAlert('Enter valid 10-digit phone & password'); return; }

        let btn = $(this);
        btn.prop('disabled', true).text('Registering...');

        database.ref('users/' + phone).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            btn.prop('disabled', false).text('Register Now');
            _showAlert('Number already registered!');
          } else {
            database.ref('users/' + phone).set({
              password: password,
              phone: phone,
              balance: 0, // Aage home page par error na aaye, isliye default value de rahe hain
              recharge: 0,
              withdraw: 0
            }).then(() => {
              btn.prop('disabled', false).text('Register Now');
              _showAlert('Account Created! Please Sign In.');
              switchForm('loginSection');
            });
          }
        }).catch(() => {
          btn.prop('disabled', false).text('Register Now');
          _showAlert('Error creating account!');
        });
      });

      // ── 3. FORGOT PASSWORD CORE LOGIC ──
      $('#forgotBtn').on('click', function () {
        let phone = $('#forgotPhone').val().trim();
        let newPassword = $('#forgotNewPassword').val();
        if (phone.length !== 10 || !newPassword) { _showAlert('Enter valid 10-digit phone & new password'); return; }

        let btn = $(this);
        btn.prop('disabled', true).text('Updating...');

        database.ref('users/' + phone).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            database.ref('users/' + phone).update({
              password: newPassword
            }).then(() => {
              btn.prop('disabled', false).text('Update Password');
              _showAlert('Password updated successfully!');
              switchForm('loginSection');
            });
          } else {
            btn.prop('disabled', false).text('Update Password');
            _showAlert('User number does not exist!');
          }
        }).catch(() => {
          btn.prop('disabled', false).text('Update Password');
          _showAlert('Error updating password!');
        });
      });
    </script>
  </body>
  </html>
